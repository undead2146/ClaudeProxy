<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Proxy Dashboard // Dynamic Reactors</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --accent: #555;
            --theme: #ffaa00;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: #fff; font-family: var(--font); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* HEADER HUD */
        .hud-header {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
            border-bottom: 1px solid #222; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .brand { font-weight: 900; letter-spacing: 4px; font-size: 14px; color: #666; display: flex; align-items: center; gap: 15px; }
        .links { display: flex; gap: 30px; }
        .links a { color: #555; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; transition: 0.3s; }
        .links a:hover { color: #fff; }

        .pulse-dot { width: 8px; height: 8px; background: #333; border-radius: 50%; box-shadow: 0 0 0 1px #333; transition: 0.3s; }
        .pulse-dot.ok { background: #0f0; box-shadow: 0 0 10px #0f0; }

        /* MAIN STAGE */
        .stage {
            flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 20px; width: 100%; padding: 40px; overflow-y: auto;
        }

        /* REACTOR COMPONENTS */
        .reactor {
            position: relative; width: 400px; height: 400px;
            display: flex; justify-content: center; align-items: center; transition: transform 0.3s ease;
        }
        .reactor:hover { transform: scale(1.02); }
        .reactor svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); }

        .btn-reactor-action {
            position: absolute; width: 26px; height: 26px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer; font-size: 14px; font-weight: bold;
            opacity: 0; transition: all 0.2s; z-index: 10; border: 1px solid rgba(255,255,255,0.1);
        }
        .reactor:hover .btn-reactor-action { opacity: 1; }
        
        .btn-delete { top: 20px; right: 20px; background: rgba(255,0,0,0.1); color: #ff4444; }
        .btn-delete:hover { background: #ff4444; color: #fff; transform: scale(1.1); }
        
        .btn-edit { top: 20px; right: 55px; background: rgba(255,255,255,0.05); color: #fff; }
        .btn-edit:hover { background: #fff; color: #000; transform: scale(1.1); }

        /* SVG PATH STYLES */
        .layer-core { fill: #000; stroke: var(--theme); stroke-width: 2px; filter: url(#glow); transition: 0.5s; }
        .layer-prov { fill: #111; stroke: #222; stroke-width: 1px; transition: all 0.3s; cursor: pointer; }
        .layer-prov:hover { fill: #1a1a1a; stroke: var(--theme); }
        .layer-prov.active { fill: var(--theme); stroke: #fff; }
        .layer-prov.selected-dormant { fill: #222; stroke: var(--theme); opacity: 0.6; }
        .layer-prov.dim { opacity: 0.1; }

        .prov-icon { fill: #555; transition: 0.3s; pointer-events: none; }
        .prov-icon.active { fill: #000; }
        .prov-icon.hover { fill: #fff; }
        .prov-icon.dim { opacity: 0.1; }

        .layer-model { fill: #050505; stroke: #222; opacity: 0; pointer-events: none; transition: all 0.3s; }
        .layer-model.visible { opacity: 1; pointer-events: auto; }
        .layer-model:hover { fill: var(--theme); opacity: 0.8; }
        .layer-model.selected { fill: var(--theme); stroke: #fff; opacity: 1; }

        text { font-family: var(--font); pointer-events: none; text-anchor: middle; dominant-baseline: middle; fill: #aaa; font-size: 11px; font-weight: 600; }
        .text-core-label { font-size: 18px; font-weight: 800; fill: #fff; letter-spacing: 1px; }
        .text-core-sub { font-size: 11px; fill: var(--theme); letter-spacing: 1px; text-transform: uppercase; }

        .btn-apply {
            background: transparent; border: 1px solid #333; color: #333; padding: 12px 40px;
            font-size: 12px; font-weight: 900; letter-spacing: 3px; border-radius: 2px;
            cursor: not-allowed; transition: all 0.4s;
        }
        .btn-apply.ready { border-color: #fff; color: #fff; cursor: pointer; }
        .btn-apply.ready:hover { background: #fff; color: #000; }

        .tooltip {
            position: fixed; background: #fff; color: #000; padding: 4px 10px; font-size: 10px;
            font-weight: 900; text-transform: uppercase; pointer-events: none; z-index: 1000; display: none;
        }
        .tooltip.visible { display: block; }

        #config-section {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            min-width: 450px; z-index: 500; background: #111; border: 1px solid #333; padding: 30px; border-radius: 12px;
        }
        #config-section input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; }
        .info-box { font-size: 10px; color: #666; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 4px; border-left: 2px solid var(--theme); margin-top: 5px; }
    </style>
</head>
<body>

        </defs>
    </svg>

    <div class="hud-header">
        <div class="brand"><div class="pulse-dot" id="sys-status"></div>CLAUDE_PROXY // DYNAMIC_ENGINE</div>
        <div class="links" id="nav-links"><a href="/providers.html">Providers</a><a href="/logs.html">Logs</a><a href="/usage">Usage</a></div>
    </div>

    <div class="stage" id="reactor-stage"></div>

    <div class="action-bar">
        <button id="btn-apply" class="btn-apply" onclick="applyChanges()">INITIALIZE SYSTEM</button>
        <button id="btn-config" class="btn-config" style="margin-left: 20px;" onclick="openConfig()">ADD_REACTOR</button>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <div id="config-section">
        <h3 id="modal-title">NEW_REACTOR_UNIT</h3>
        <input type="hidden" id="edit-id" />
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-size: 11px; color: #888;">UNIT IDENTIFIER</label>
            <input type="text" id="new-reactor-id" placeholder="e.g. fast-unit" />
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-size: 11px; color: #888;">DISPLAY LABEL</label>
            <input type="text" id="new-reactor-label" placeholder="e.g. FAST ENGINE" />
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-size: 11px; color: #888;">MATCH PATTERN</label>
            <input type="text" id="new-reactor-pattern" placeholder="e.g. sonnet-fast" />
            <div class="info-box">If requested model name contains this string, this reactor activates.</div>
        </div>
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 5px; font-size: 11px; color: #888;">REACTOR THEME</label>
            <input type="color" id="new-reactor-color" value="#ffaa00" style="height: 40px;" />
        </div>
        <div style="display: flex; gap: 15px;">
            <button onclick="saveReactor()" style="flex: 1; background: #fff; border: none; color: #000; padding: 14px; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase;">COMMIT</button>
            <button onclick="closeConfig()" style="flex: 1; background: #222; border: none; color: #fff; padding: 14px; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase;">ABORT</button>
        </div>
    </div>

    <script>
        const PROVIDER_ICONS = {
            'antigravity': 'icon-antigravity',
            'zai': 'icon-zai',
            'anthropic': 'icon-anthropic',
            'copilot': 'icon-copilot',
            'openrouter': 'icon-openrouter',
            'custom': 'icon-custom'
        };

        const PROVIDER_LABELS = {
            'antigravity': 'Antigravity',
            'zai': 'Z.AI',
            'anthropic': 'Anthropic',
            'copilot': 'Copilot',
            'openrouter': 'OpenRouter',
            'custom': 'Custom (Env)'
        };

        let PROVIDERS = [];
        let reactors = {}; 
        let state = { config: { reactors: [] }, serverConfig: { reactors: [] }, models: {}, availability: {} };

        const polarToCartesian = (cx, cy, r, deg) => {
            const rad = (deg - 90) * Math.PI / 180.0;
            return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
        };

        const describeSector = (x, y, rInner, rOuter, startA, endA) => {
            if (endA - startA >= 359.9) return `M ${x} ${y-rOuter} A ${rOuter} ${rOuter} 0 1 1 ${x-0.01} ${y-rOuter} L ${x-0.01} ${y-rInner} A ${rInner} ${rInner} 0 1 0 ${x} ${y-rInner} Z`;
            const sO = polarToCartesian(x, y, rOuter, endA), eO = polarToCartesian(x, y, rOuter, startA), sI = polarToCartesian(x, y, rInner, endA), eI = polarToCartesian(x, y, rInner, startA);
            const large = endA - startA <= 180 ? "0" : "1";
            return ["M", sO.x, sO.y, "A", rOuter, rOuter, 0, large, 0, eO.x, eO.y, "L", eI.x, eI.y, "A", rInner, rInner, 0, large, 1, sI.x, sI.y, "Z"].join(" ");
        };

        class Reactor {
            constructor(el, conf) {
                this.el = el; this.id = conf.id; this.config = conf; this.hovered = null;
                this.cx=200; this.cy=200; this.rC=50; this.rPI=55; this.rPO=110; this.rMI=115; this.rMO=195; this.initd = false;
            }

            init() {
                this.el.innerHTML = `
                    <div class="btn-reactor-action btn-delete" onclick="removeUnit('${this.id}')">×</div>
                    <div class="btn-reactor-action btn-edit" onclick="openConfig('${this.id}')">✎</div>
                    <svg viewBox="0 0 400 400" onmouseleave="reactorLeave('${this.id}')">
                        <defs><filter id="glow-${this.id}"><feGaussianBlur stdDeviation="5" /><feComposite in="SourceGraphic" operator="over" /></filter></defs>
                        <g class="grp-c"></g><g class="grp-p"></g><g class="grp-m"></g>
                    </svg>
                `;
                this.drawCore(); this.drawProvs(); this.initd = true;
            }

            drawCore() {
                const g = this.el.querySelector('.grp-c'); this.el.style.setProperty('--theme', this.config.theme);
                g.innerHTML = `<circle cx="${this.cx}" cy="${this.cy}" r="${this.rC}" class="layer-core" style="filter:url(#glow-${this.id})" />
                               <text x="${this.cx}" y="${this.cy-10}" class="text-core-label">${this.config.label.toUpperCase()}</text>
                               <text x="${this.cx}" y="${this.cy+15}" class="text-core-sub">...</text>`;
            }

            drawProvs() {
                const g = this.el.querySelector('.grp-p');
                if (!PROVIDERS.length) return;
                const pStep = 360 / PROVIDERS.length;
                let h = ''; PROVIDERS.forEach((p, i) => {
                    const sA = i*pStep, eA = (i+1)*pStep, d = describeSector(this.cx, this.cy, this.rPI, this.rPO, sA+1, eA-1), m = sA+(pStep/2), pos = polarToCartesian(this.cx, this.cy, (this.rPI+this.rPO)/2, m);
                    h += `<g class="prov-item" data-pid="${p.id}" onmouseenter="reactorHover('${this.id}','${p.id}')" onclick="selectProvider('${this.id}','${p.id}')">
                            <path d="${d}" class="layer-prov" /><use href="#${p.icon}" x="${pos.x-10}" y="${pos.y-10}" width="20" height="20" class="prov-icon" /></g>`;
                }); g.innerHTML = h;
            }

            render() {
                if(!this.initd) this.init();
                const curP = this.config.provider_id, curM = this.config.model, tarP = this.hovered || curP;
                const sub = this.el.querySelector('.text-core-sub'); if(sub) sub.textContent = clean(curM || 'AUTO').substring(0,14);
                this.el.querySelectorAll('.prov-item').forEach(e => {
                    const pid = e.dataset.pid, act = curP === pid, hov = this.hovered === pid, p = e.querySelector('path'), i = e.querySelector('use');
                    p.classList.toggle('active', act && !this.hovered); p.classList.toggle('selected-dormant', act && this.hovered && !hov); p.classList.toggle('dim', tarP && pid !== tarP);
                    i.classList.toggle('active', act); i.classList.toggle('hover', hov); i.classList.toggle('dim', tarP && pid !== tarP);
                }); this.drawModels(curP, curM, tarP);
            }

            drawModels(curP, curM, tarP) {
                const g = this.el.querySelector('.grp-m'); g.innerHTML = ''; if(!tarP) return;
                const ms = (state.models[tarP] || []).filter(m => !m.includes('gemini-2.5'));
                if(!ms.length) { g.innerHTML = `<circle cx="${this.cx}" cy="${this.cy}" r="${(this.rMI+this.rMO)/2}" stroke="#111" stroke-width="80" fill="none" opacity="0.1" />`; return; }
                const step = 360/ms.length; let h = '';
                ms.forEach((m, i) => {
                    const sA = i*step, eA = (i+1)*step, sel = (curP===tarP && curM===m), d = describeSector(this.cx, this.cy, this.rMI, this.rMO, sA+0.5, eA-0.5), mid = sA+(step/2), pos = polarToCartesian(this.cx, this.cy, (this.rMI+this.rMO)/2, mid);
                    let rot = mid-90; if(pos.x < this.cx) rot += 180;
                    let l = clean(m); const max = Math.floor((step/360)*1250/8); if(l.length > max) l = l.substring(0, max-1)+'…';
                    h += `<g onclick="selectModel('${this.id}','${tarP}','${m}')"><path d="${d}" class="layer-model visible ${sel?'selected':''}" /><text x="${pos.x}" y="${pos.y}" transform="rotate(${rot},${pos.x},${pos.y})" class="text-model">${l}</text></g>`;
                }); g.innerHTML = h;
            }
        }

        async function fetchData() {
            try {
                const k = new URLSearchParams(window.location.search).get('key'), r = await fetch(k?`/config?key=${k}`:'/config'), d = await r.json();
                state.models = d.available_models; state.availability = d.providers_available; state.serverConfig = d.config;
                if(!state.config.reactors.length) state.config = JSON.parse(JSON.stringify(d.config));
                
                // Build dynamic providers list
                const newProvs = [];
                Object.keys(d.providers_available).forEach(pid => {
                    if (d.providers_available[pid]) {
                        newProvs.push({
                            id: pid,
                            icon: PROVIDER_ICONS[pid] || 'icon-custom',
                            label: PROVIDER_LABELS[pid] || pid.toUpperCase().replace(/-/g, ' ')
                        });
                    }
                });
                
                // Only re-init if provider count changed
                if (newProvs.length !== PROVIDERS.length) {
                    PROVIDERS = newProvs;
                    Object.values(reactors).forEach(r => r.initd = false);
                }

                sync(); checkDirty(); document.getElementById('sys-status').classList.add('ok');
            } catch(e) { document.getElementById('sys-status').classList.remove('ok'); }
        }

        function sync() {
            const s = document.getElementById('reactor-stage'), ids = state.config.reactors.map(r => r.id);
            Object.keys(reactors).forEach(id => { if(!ids.includes(id)){ reactors[id].el.remove(); delete reactors[id]; } });
            state.config.reactors.forEach(c => {
                if(!reactors[c.id]){ const d = document.createElement('div'); d.id = `m-${c.id}`; d.className = 'reactor'; s.appendChild(d); reactors[c.id] = new Reactor(d, c); }
                else reactors[c.id].config = c; reactors[c.id].render();
            });
        }

        window.reactorHover = (id, p) => { if(reactors[id]){ reactors[id].hovered = p; reactors[id].render(); } tooltip(p); };
        window.reactorLeave = (id) => { if(reactors[id]){ reactors[id].hovered = null; reactors[id].render(); } tooltip(null); };
        function tooltip(p){ const tt = document.getElementById('tooltip'); if(!p){ tt.classList.remove('visible'); return; } tt.textContent = PROVIDERS.find(x => x.id === p)?.label || p; tt.classList.add('visible'); }
        document.addEventListener('mousemove', e => { const tt = document.getElementById('tooltip'); if(tt.classList.contains('visible')){ tt.style.left = (e.pageX+15)+'px'; tt.style.top = (e.pageY+15)+'px'; } });

        window.selectProvider = (rid, pid) => { const r = state.config.reactors.find(x => x.id === rid); if(r){ r.provider_id = pid; const ms = (state.models[pid] || []).filter(m => !m.includes('gemini-2.5')); if(ms.length) r.model = ms[0]; sync(); checkDirty(); } };
        window.selectModel = (rid, pid, mid) => { const r = state.config.reactors.find(x => x.id === rid); if(r){ r.provider_id = pid; r.model = mid; sync(); checkDirty(); } };
        window.removeUnit = (rid) => { if (confirm(`Decommission reactor [${rid.toUpperCase()}]?`)){ state.config.reactors = state.config.reactors.filter(r => r.id !== rid); sync(); checkDirty(); } };

        function openConfig(rid = null) {
            const m = document.getElementById('config-section'); m.style.display = 'block';
            if(rid) {
                const r = state.config.reactors.find(x => x.id === rid);
                document.getElementById('modal-title').textContent = 'RECONFIGURE_UNIT';
                document.getElementById('edit-id').value = rid;
                document.getElementById('new-reactor-id').value = r.id;
                document.getElementById('new-reactor-id').disabled = true;
                document.getElementById('new-reactor-label').value = r.label;
                document.getElementById('new-reactor-pattern').value = r.pattern;
                document.getElementById('new-reactor-color').value = r.theme;
            } else {
                document.getElementById('modal-title').textContent = 'NEW_REACTOR_UNIT';
                document.getElementById('edit-id').value = '';
                document.getElementById('new-reactor-id').value = '';
                document.getElementById('new-reactor-id').disabled = false;
                document.getElementById('new-reactor-label').value = '';
                document.getElementById('new-reactor-pattern').value = '';
                document.getElementById('new-reactor-color').value = '#ffaa00';
            }
        }
        window.openConfig = openConfig;
        function closeConfig() { document.getElementById('config-section').style.display = 'none'; }
        window.closeConfig = closeConfig;

        function saveReactor() {
            const editId = document.getElementById('edit-id').value, id = document.getElementById('new-reactor-id').value.trim().toLowerCase(), label = document.getElementById('new-reactor-label').value.trim(), pattern = document.getElementById('new-reactor-pattern').value.trim(), theme = document.getElementById('new-reactor-color').value;
            if(!id || !label) return alert("ID and Label required");
            if(editId) {
                const r = state.config.reactors.find(x => x.id === editId);
                r.label = label; r.pattern = pattern; r.theme = theme;
            } else {
                if(state.config.reactors.find(r => r.id === id)) return alert("ID must be unique");
                state.config.reactors.push({ id, label, pattern, theme, provider_id: 'anthropic', model: '' });
            }
            closeConfig(); sync(); checkDirty();
        }
        window.saveReactor = saveReactor;

        function checkDirty() { const dirty = JSON.stringify(state.config) !== JSON.stringify(state.serverConfig); const btn = document.getElementById('btn-apply'); btn.classList.toggle('ready', dirty); btn.textContent = dirty ? "APPLY CHANGES" : "SYSTEM ACTIVE"; }
        window.applyChanges = async () => {
            if(!document.getElementById('btn-apply').classList.contains('ready')) return;
            const k = new URLSearchParams(window.location.search).get('key');
            try { await fetch(k?`/config?key=${k}`:'/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state.config) }); state.serverConfig = JSON.parse(JSON.stringify(state.config)); checkDirty(); fetchData(); } catch(e){ alert(e); }
        };

        function clean(s) { if(!s) return ''; return s.toLowerCase().replace(/^(anthropic|google|openai|zai|z\.ai|meta|mistral|deepseek)\//, '').replace(/^(claude|gemini|gpt|llama|mistral)-/, '').toUpperCase(); }
        async function init() { await fetchData(); setInterval(fetchData, 4000); }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
